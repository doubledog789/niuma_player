name: niuma_player
description: >-
  Flutter video player SDK with unified API across iOS / Android / Web, plus
  automatic ExoPlayer to IJK fallback on Android.
version: 0.2.3
homepage: https://github.com/axin789/niuma_player
repository: https://github.com/axin789/niuma_player
issue_tracker: https://github.com/axin789/niuma_player/issues
documentation: https://github.com/axin789/niuma_player#readme
topics:
  - video
  - player
  - hls
  - exoplayer
  - ijkplayer

environment:
  # 3.4 needed for package:web + dart:js_interop_unsafe (web 后端用)。
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # iOS uses video_player → AVPlayer; Web uses video_player → <video>.
  # Android does NOT use video_player at runtime (we ship native ExoPlayer +
  # IJK), but the package still has to be in the pubspec because
  # VideoPlayerBackend on the Dart side imports it. AGP just leaves the
  # video_player_android plugin's small Java surface unused.
  #
  # Web HLS note: mp4 plays natively via <video> in all browsers, Safari plays
  # m3u8 natively. Chrome/Firefox/Edge need hls.js (MSE) for HLS — we vendor
  # it under assets/hls/hls.min.js and lazy-inject the <script> only when an
  # HLS source actually plays on a non-Safari browser (see web_video_backend).
  # Nothing extra is loaded for mp4-only pages.
  # 2.10.0 加入 VideoPlayerController.playerId getter，iOS PiP 桥需要它把
  # Flutter texture id 映射到原生 AVPlayer 实例（见 video_player_backend.dart）
  video_player: ">=2.10.0 <3.0.0"
  plugin_platform_interface: ^2.0.2
  flutter_web_plugins:
    sdk: flutter
  # @experimental annotation 用——meta 通过 flutter SDK 已 transitive
  # 可用，这里显式声明避开 depend_on_referenced_packages lint。
  meta: ^1.10.0
  # NiumaPlayerPool 用 clock.now() 取时间，让 fake_async 单测能控制 stale
  # 清理的时间推进；transitive 已可用，显式声明避开 lint。
  clock: ^1.1.1
  # Web 后端用 <video> + DOM 操作。用 package:web（替代已废弃的 dart:html），
  # 让 web 端可随 `flutter build web --wasm` 编译。
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: cn.niuma.niuma_player
        pluginClass: NiumaPlayerPlugin
      ios:
        pluginClass: NiumaPlayerPlugin
      web:
        pluginClass: NiumaPlayerWebRegistrar
        fileName: niuma_player_web.dart
  assets:
    - assets/hls/
