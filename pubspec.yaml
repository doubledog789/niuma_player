name: niuma_player
description: "Flutter video player plugin with video_player→IJK fallback for older/Huawei Android devices."
version: 0.0.1
homepage:

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.9.0
  shared_preferences: ^2.3.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: cn.niuma.niuma_player
        pluginClass: NiumaPlayerPlugin
      ios:
        pluginClass: NiumaPlayerPlugin
