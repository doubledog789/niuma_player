name: niuma_player
description: >-
  Production-grade Flutter video player with a unified API across iOS, Android,
  and Web, plus an automatic ExoPlayer → IJK fallback path on Android for
  devices without working hardware decoders.
version: 0.8.0
homepage: https://github.com/axin789/niuma_player
repository: https://github.com/axin789/niuma_player
issue_tracker: https://github.com/axin789/niuma_player/issues
documentation: https://github.com/axin789/niuma_player#readme
topics:
  - video
  - player
  - hls
  - exoplayer
  - ijkplayer

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # iOS uses video_player → AVPlayer; Web uses video_player → <video>.
  # Android does NOT use video_player at runtime (we ship native ExoPlayer +
  # IJK), but the package still has to be in the pubspec because
  # VideoPlayerBackend on the Dart side imports it. AGP just leaves the
  # video_player_android plugin's small Java surface unused.
  #
  # Web HLS note: we deliberately do NOT depend on video_player_web_hls.
  # mp4/webm play natively in all browsers via <video>, and Safari supports
  # m3u8 natively. Chrome/Firefox/Edge can't play m3u8 here, but pulling in
  # hls.js (~250KB minified) for that one case isn't worth the bundle cost
  # given mobile is the primary target. Re-add the dep if HLS-in-browser
  # becomes a hard requirement.
  shared_preferences: ^2.2.0
  video_player: ">=2.8.0 <3.0.0"
  plugin_platform_interface: ^2.0.2
  # Used by NiumaPlayerController to fetch WebVTT thumbnail tracks (M8).
  # Cross-platform: VM uses dart:io HttpClient, web auto-routes to
  # XMLHttpRequest. CORS for web is the caller's responsibility.
  http: ^1.0.0
  # 渲染资源包里的 niuma 风格 SVG 图标 + loading 动画。
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: cn.niuma.niuma_player
        pluginClass: NiumaPlayerPlugin
      ios:
        pluginClass: NiumaPlayerPlugin
  assets:
    - assets/loading/loading_animated.svg
