# niuma_player IJK / FFmpeg 版本锁定
# 本文件为所有 android/localmaven/.../ijkplayer-*.aar 产物的唯一事实源。
# 任何版本变更都必须先改本文件，再改脚本。
# 参考: docs/plans/2026-04-24-niuma-player-design.md Section 7.1
#
# 2026-06-01: 切到 FFmpeg 7.1.1（对齐 fijkplayer），最小化 VOD mp4/HLS 配置。
# 旧的 debugly/ijkplayer + bilibili FFmpeg 4.0 假设已废弃，见下方 LEGACY 段。

IJK_FORK=ShikinChen/ijkplayer-android
IJK_TAG=ijk0.8.8--ff7.1
IJK_COMMIT=1b61cbe52473f7abb3f4f2cd19e2359d22f8dde8
FFMPEG_FORK=ShikinChen/FFmpeg
FFMPEG_TAG=ff7.1--ijk0.8.8
FFMPEG_COMMIT=8a58da9ff653b9bca365f06e9860b22156c38ae0
FFMPEG_VERSION=n7.1.1
# 注: 内嵌 .so 的 FFMPEG_VERSION 字符串显示 "n3.2-dev-36506-g8a58da9ff6"
# （fork 的 git tag 拓扑导致 git describe 取到远古 n3.2-dev 标签），
# 但库版本三元组 libavformat 61.7.100 / libavcodec 61 / libavutil 59
# 唯一对应 FFmpeg 7.1.x，且提交信息为「升级到FFmpeg7」。这是真 ff7.1.1。
OPENSSL_VERSION=3.2
OPENSSL_COMMIT=14ddbcee237cb99b3921c352852b4d4fadbb8e6c
LIBYUV_COMMIT=ijk-r0.2.1-dev
SOUNDTOUCH_COMMIT=ijk-r0.1.2-dev

# 双 NDK: 21 用 autotools 编 FFmpeg + OpenSSL；27 用 cmake 编 JNI .so
NDK_FFMPEG_REVISION=21.4.7075529
NDK_CMAKE_REVISION=27.0.12077973
COMPILE_SDK=35
TARGET_SDK=35
MIN_SDK=21
# 最小化: 仅真机两 ABI；x86/x86_64 模拟器 ABI 未编（模拟器跑不了 IJK 兜底）
ABI=arm64-v8a,armeabi-v7a
FFMPEG_MODULE=modules/module-niuma-ff7-slim.sh
LICENSE=LGPL-2.1
FFMPEG_GPL=disabled
FFMPEG_NONFREE=disabled
# 说明: ShikinChen 的 do-compile-ffmpeg.sh 检测到 extra/openssl 时会强行
# 追加 --enable-nonfree --enable-openssl（OpenSSL 链接需 nonfree 标记）。
# 与 fijkplayer 现网 ff7.1.1 产物一致；仍 --disable-gpl，不引入 GPL 代码。
OPENSSL_LINK=static
AAR_VERSION=0.8.8-ff7.1.1-20260601

